<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Regsitration</title>
  </head>
  <body>
    <h1>User Regsitration</h1>
    <h2>Personal Details</h2>
    <div>
      <label>First Name:</label>
      <input type="text" />
    </div>
    <div>
      <label>Last Name:</label>
      <input type="text" />
    </div>
    <div>
      <label>Age:</label>
      <input type="number" />
    </div>
    <div>
      <label>Gender:</label>
      <select>
        <option selected>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>
    </div>
    <div>
      <label>Profile Picture:</label>
      <button>Browse...</button>
      <label>No files selected.</label>
    </div>
    <h2>Account Details</h2>
    <div>
      <label>Email:</label>
      <input type="email" />
    </div>
    <div>
      <label>Password:</label>
      <input type="password" />
    </div>
    <div>
      <label>Role:</label>
      <input type="radio" /><label>Admin</label> <input type="radio" /><label
        >User</label
      >
    </div>
    <div>
      <input type="checkbox" /><label
        >I agree with the terms and conditions.</label
      >
    </div>
    <div>
      <button>Register</button>
      <button>Reset</button>
    </div>
    <footer>©2026 My Todo list.All rights reserved.</footer>
  </body>
</html>
